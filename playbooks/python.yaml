# ------------------------------------------------------------------------------

- name: Playbook to Install Python
  hosts: all
  become: true
  gather_facts: false

  tasks:

    - name: Get remote OS id via raw command
      ansible.builtin.raw: |
        echo $(grep '^ID_LIKE=' /etc/os-release || grep '^ID=' /etc/os-release) \
        | cut -d= -f2
      register: command
      failed_when: command.stdout | default('') | trim | length == 0
      changed_when: false

    - name: Clean OS id and save to a new fact
      ansible.builtin.set_fact:
        remote_os: "{{ command.stdout | trim | lower }}"

    - name: Install Python in Alpine
      register: install_python
      ansible.builtin.raw: |
        if ! command -v python3 > /dev/null 2>&1; then
          apk update \
          && apk add --no-cache --no-interactive python3 py3-pip \
          && exit 123
        fi
      failed_when: install_python.rc != 0 and install_python.rc != 123
      changed_when: install_python.rc == 123
      when: remote_os == "alpine"

    - name: Install Python in Debian
      register: install_python
      ansible.builtin.raw: |
        if ! command -v python3 > /dev/null 2>&1; then
          apt-get update \
          && apt-get install -y --no-install-recommends python3 python3-pip python3-venv \
          && rm -rf /var/lib/apt/lists/* \
          && exit 123
        fi
      failed_when: install_python.rc != 0 and install_python.rc != 123
      changed_when: install_python.rc == 123
      when: remote_os == "debian"

# ------------------------------------------------------------------------------

- name: Playbook to configure Host
  hosts: all
  become: true
  vars:
    normalized_hostname: "{{ ds_host.name | default('') | trim }}"
    hostname_provided: "{{ ds_host.name | default('') | trim | length > 0 }}"

  tasks:

    - name: Set hostname
      ansible.builtin.hostname:
        name: "{{ normalized_hostname }}"
        use: "{{ remote_os }}"
      when: hostname_provided

    - name: Ensure hostname exists in /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^127\.0\.1\.1\s+'
        line: "127.0.1.1 {{ normalized_hostname }}"
      when: hostname_provided

    - name: Ensure localhost resolves to IPv4
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^::1\s+'
        line: "::1 ip6-localhost ip6-loopback"
      when: hostname_provided
